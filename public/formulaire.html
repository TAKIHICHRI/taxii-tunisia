<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>نموذج الأسئلة</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Tajawal',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .box{background:rgba(255,255,255,.15);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:20px;padding:32px;width:100%;max-width:520px;border:1px solid rgba(255,255,255,.18);box-shadow:0 8px 32px rgba(31,38,135,.37);color:#fff}
    h2{margin:0 0 20px;text-align:center}
    .form-group{margin-bottom:14px}
    label{display:block;margin-bottom:8px;font-weight:600;color:#f7f7f7}
    input,select,textarea{width:100%;box-sizing:border-box;border:none;border-radius:12px;padding:12px 14px;background:rgba(255,255,255,.92);font-family:'Tajawal',sans-serif;font-size:16px;outline:none}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    button{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(90deg,#ff416c,#ff4b2b);color:#fff;font-weight:800;font-size:18px;cursor:pointer}
    .error{display:none;margin-top:10px;color:#ff6b6b;text-align:center}
  </style>
  <meta name="referrer" content="no-referrer">
</head>
<body>
  <div class="box">
    <h2>نموذج الأسئلة</h2>
    <form action="https://formsubmit.co/takihichri76@gmail.com" method="POST">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_subject" value="إجابات نموذج الأسئلة">
      <div class="form-group">
        <label>الاسم الكامل</label>
        <input type="text" name="الاسم الكامل" required>
      </div>
      <div class="row">
        <div class="form-group">
          <label>رقم الهاتف</label>
          <input type="tel" name="رقم الهاتف" inputmode="numeric" dir="ltr" placeholder="+216 98 000 000">
        </div>
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" name="البريد الإلكتروني" required>
        </div>
      </div>
      <div class="form-group">
        <label>سؤال 1: ما نوع الخدمة المطلوبة؟</label>
        <select name="سؤال 1" required>
          <option value="">اختر إجابة</option>
          <option>استشارة</option>
          <option>تطوير موقع</option>
          <option>تطوير تطبيق</option>
          <option>أخرى</option>
        </select>
      </div>
      <div class="form-group">
        <label>سؤال 2: موعد مفضل للتواصل</label>
        <input type="text" name="سؤال 2" placeholder="مثال: مساءً من 18:00 إلى 20:00">
      </div>
      <div class="form-group">
        <label>سؤال 3: ميزانية متوقعة</label>
        <input type="text" name="سؤال 3" placeholder="مثال: 500 - 1500 TND" dir="ltr">
      </div>
      <div class="form-group">
        <label>تفاصيل إضافية</label>
        <textarea name="تفاصيل إضافية" rows="4" placeholder="اكتب أي تفاصيل أو أسئلة إضافية" required></textarea>
      </div>
      <button type="submit">إرسال الإجابات</button>
      <div id="err" class="error">حدث خطأ، يرجى إعادة المحاولة لاحقاً</div>
    </form>
  </div>
  <script>
    const f=document.querySelector('form'),err=document.getElementById('err');
    f.addEventListener('submit',async (e)=>{
      e.preventDefault();
      err.style.display='none';
      try{
        const fd=new FormData(f);
        const res=await fetch(f.action,{method:'POST',headers:{'Accept':'application/json'},body:fd});
        if(res.ok){alert('تم الإرسال بنجاح. أول مرة ستصلك رسالة تفعيل من FormSubmit. بعد التفعيل ستصل الإجابات مباشرة إلى بريدك.');f.reset();}
        else{err.style.display='block';}
      }catch{err.style.display='block';}
    });
  </script>
  </body>
</html>
